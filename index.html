<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zpl-renderer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 32px 16px;
  }
  h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.05em; color: #888; text-transform: uppercase; }
  .container {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    max-width: 90vw;
  }
  img {
    display: block;
    max-width: 100%;
    height: auto;
    background: #fff;
    border-radius: 4px;
    image-rendering: auto;
  }
  .status {
    font-size: 12px;
    color: #666;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<h1>zpl-renderer</h1>
<div class="container">
  <img id="label" src="/label.png" alt="ZPL label preview">
  <div class="status">
    Polling every 100ms &middot; frame <span id="frame">0</span>
  </div>
</div>
<script>
  const img = document.getElementById("label");
  const frameEl = document.getElementById("frame");
  let frame = 0;

  function tick() {
    frame++;
    frameEl.textContent = frame;
    img.src = "/label.png?" + Date.now();
  }

  setInterval(tick, 100);
</script>
</body>
</html>
